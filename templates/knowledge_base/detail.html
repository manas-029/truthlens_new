{% extends "base.html" %}
{% block title %}{{ article.title }} — TruthLens{% endblock %}
{% block content %}
<section class="section">
  <div class="container" style="max-width:720px;">
    {% if article %}
      <span class="eyebrow">Learn</span>
      <h2>{{ article.title }}</h2>
      <div class="panel card">
        <p>{{ article.body }}</p>
      </div>
    {% else %}
      <p>Article not found.</p>
    {% endif %}
    <a href="{% url 'knowledge_base:article_list' %}" class="btn btn-ghost" style="margin-top:20px;">← Back to Learn</a>
  </div>
</section>
{% endblock %}
