{% extends "base.html" %}
{% block title %}Learn — TruthLens{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow">Knowledge base</span>
      <h2>Understanding deepfakes</h2>
    </div>
    <div class="grid grid-3">
      {% for a in articles %}
      <a href="{% url 'knowledge_base:article_detail' a.slug %}" class="panel card" style="color:inherit;">
        <h3 style="margin-top:0;">{{ a.title }}</h3>
        <p>{{ a.summary }}</p>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
