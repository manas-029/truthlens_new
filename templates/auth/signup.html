{% extends "base.html" %}
{% load static %}
{% block title %}Sign up — TruthLens{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="panel auth-card glow-border">
    <h2>Create your account</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary btn-block">Sign up</button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:0.85rem;">Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
  </div>
</div>
{% endblock %}
