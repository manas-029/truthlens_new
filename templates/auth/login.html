{% extends "base.html" %}
{% load static %}
{% block title %}Log in — TruthLens{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="panel auth-card glow-border">
    <h2>Welcome back</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:0.85rem;">No account? <a href="{% url 'accounts:signup' %}">Sign up</a></p>
    <p style="text-align:center; margin-top:8px; font-size:0.85rem;"><a href="{% url 'accounts:password_reset' %}">Forgot password?</a></p>
  </div>
</div>
{% endblock %}
