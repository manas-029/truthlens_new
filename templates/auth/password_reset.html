{% extends "base.html" %}
{% load static %}
{% block title %}Reset Password - TruthLens{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="panel auth-card glow-border">
    <h2>Reset password</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
    </form>
  </div>
</div>
{% endblock %}
